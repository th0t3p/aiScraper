# ── AI Scraper docker-compose ────────────────────────────────────────────────
# Start:   docker compose up -d
# Stop:    docker compose down
#
# Notes:
#   - Only PostgreSQL runs in Docker — the ai-scraper app itself runs
#     natively (python -m ai_scraper) because Burp's MCP Server rejects
#     Docker-originated connections via its anti-DNS-rebinding protection.
#   - Postgres is exposed on port 5432 so the native app can connect.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-scraper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AI_SCRAPER__POSTGRES__USER:-postgres}
      POSTGRES_PASSWORD: ${AI_SCRAPER__POSTGRES__PASSWORD}
      POSTGRES_DB: ${AI_SCRAPER__POSTGRES__DATABASE:-bugbounty}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_SCRAPER__POSTGRES__USER:-postgres} -d ${AI_SCRAPER__POSTGRES__DATABASE:-bugbounty}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
